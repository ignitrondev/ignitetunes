name: Build APK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Create GitHub Release & upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "IgniteTunes ${{ github.ref_name }}"
          body: |
            ## IgniteTunes ${{ github.ref_name }}

            ### Download
            - `app-release-arm64-v8a.apk` — untuk HP modern (64-bit)
            - `app-release-armeabi-v7a.apk` — untuk HP lama (32-bit)
            - `app-release-x86_64.apk` — untuk emulator
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
